name: Run Node.js Puppeteer App in Docker

on:
  push:
    branches: [ main ]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx (optional, for caching etc.)
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t puppeteer-app .

      - name: Run container from image
        run: docker run --rm puppeteer-app
